<style>
  /* ── Base ── */
  * { -webkit-tap-highlight-color: transparent; }
  body {
    background: #F4F1ED;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    color: #1C1A17;
    overscroll-behavior: none;
  }

  /* ── Scrollbar hide ── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* ── Smooth transitions ── */
  .fade-in { animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* ── Timeline vertical line ── */
  .timeline-line::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 32px;
    bottom: -16px;
    width: 1px;
    background: #D8D3CB;
  }

  /* ── Status dot ── */
  .dot-todo    { background: #D8D3CB; }
  .dot-active  { background: #3D6B5C; box-shadow: 0 0 0 3px rgba(61,107,92,0.2); }
  .dot-done    { background: #7A756D; }

  /* ── Card tap feedback ── */
  .tap-card:active { background: #EAE6E0; }

  /* ── Tab active ── */
  .tab-active span { color: #1C1A17; }
  .tab-active .tab-dot { background: #3D6B5C; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: #1C1A17; color: #F4F1ED;
    padding: 8px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.25s ease;
    pointer-events: none; white-space: nowrap; z-index: 9999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Guide mode overlay ── */
  #guide-overlay {
    transition: opacity 0.2s ease;
  }

  /* ── Details expand ── */
  .details-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.28s ease;
  }
  .details-panel.open {
    max-height: 600px;
  }

  /* ── Progress bar ── */
  .progress-bar {
    transition: width 0.4s ease;
  }

  /* ── Quick badge pulse ── */
  .pulse-badge {
    animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.6; }
  }
</style>

<!-- ════════════════════════════════════════
     APP LOGIC
     ════════════════════════════════════════ -->
<script>
// ── State ──
let state = {
  currentDay: 0,       // index into TRIP.days
  guideMode: false,
  currentTab: 'itinerary',
  // item statuses stored per-item: { [itemId]: 'todo'|'active'|'done' }
  statuses: {},
  expandedItems: {},   // { [itemId]: true/false }
};

// ── localStorage key ──
const LS_KEY = 'trip_state_v1';

// ── Type icons and colors ──
const TYPE_META = {
  transport: { icon: '🚌', color: '#5E7A8B', label: '交通' },
  food:      { icon: '🍽', color: '#8B6B3D', label: '餐飲' },
  spot:      { icon: '🏛', color: '#3D6B5C', label: '景點' },
  meetup:    { icon: '📍', color: '#8B3A3A', label: '集合' },
  photo:     { icon: '📸', color: '#5E4B8B', label: '合照' },
  note:      { icon: '⚠️', color: '#8B5E3C', label: '注意' },
};

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
function init() {
  loadState();
  renderAll();
  switchTab(state.currentTab);
}

function loadState() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.currentDay = parsed.currentDay ?? 0;
      state.guideMode  = parsed.guideMode  ?? false;
      state.statuses   = parsed.statuses   ?? {};
      state.currentTab = parsed.currentTab ?? 'itinerary';
    }
  } catch(e) { /* ignore */ }
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      currentDay: state.currentDay,
      guideMode:  state.guideMode,
      statuses:   state.statuses,
      currentTab: state.currentTab,
    }));
  } catch(e) { /* ignore */ }
}

// ──────────────────────────────────────────
// RENDER ALL
// ──────────────────────────────────────────
function renderAll() {
  const day = TRIP.days[state.currentDay];

  // Header
  document.getElementById('header-trip-name').textContent = TRIP.name;
  document.getElementById('header-region').textContent = TRIP.dates + '　' + TRIP.region;
  document.getElementById('header-day-label').textContent = day.label + '　' + day.title;
  document.getElementById('header-day-date').textContent = day.date;

  // Progress
  renderProgress(day);

  // Overview card
  document.getElementById('ov-label').textContent = day.label + '　' + day.date;
  document.getElementById('ov-title').textContent = day.title;
  document.getElementById('ov-people-badge').textContent = day.people;
  document.getElementById('ov-transport').textContent = day.transport;
  document.getElementById('ov-hotel').textContent = day.hotel;
  document.getElementById('ov-meetup').textContent = day.meetup;
  document.getElementById('ov-motto').textContent = day.motto;

  // Route bar
  document.getElementById('route-bar').textContent = '📍 ' + day.route;

  // Timeline
  renderTimeline(day);

  // Transit tab
  renderTransit(day);

  // Checklist tab
  renderChecklist(day);

  // Memo tab
  renderMemo(day);

  // Guide mode
  if (state.guideMode) {
    renderGuideMode(day);
  }
}

// ──────────────────────────────────────────
// PROGRESS BAR
// ──────────────────────────────────────────
function renderProgress(day) {
  const total = day.timeline.length;
  const done  = day.timeline.filter(i => getStatus(i.id) === 'done').length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `完成 ${done}/${total} 項`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

// ──────────────────────────────────────────
// TIMELINE
// ──────────────────────────────────────────
function renderTimeline(day) {
  const container = document.getElementById('timeline-container');
  container.innerHTML = '';

  day.timeline.forEach((item, idx) => {
    const status   = getStatus(item.id);
    const expanded = state.expandedItems[item.id] ?? false;
    const isLast   = idx === day.timeline.length - 1;
    const meta     = TYPE_META[item.type] || TYPE_META.spot;

    const dotClass = status === 'done' ? 'dot-done' : status === 'active' ? 'dot-active' : 'dot-todo';

    const card = document.createElement('div');
    card.className = 'relative flex gap-3 pb-4' + (isLast ? '' : ' timeline-line');
    card.innerHTML = `
      <!-- Dot -->
      <div class="flex-shrink-0 w-10 flex flex-col items-center pt-1 z-10">
        <div class="${dotClass} w-3 h-3 rounded-full border-2 transition-all" style="border-color:#F4F1ED;"></div>
      </div>

      <!-- Card -->
      <div class="flex-1 min-w-0">
        <div class="rounded-xl overflow-hidden tap-card transition-colors cursor-pointer"
             style="background:#fff; border:1px solid #EAE6E0; ${status==='done'?'opacity:0.55;':''}"
             onclick="toggleExpand('${item.id}')">

          <!-- Card header -->
          <div class="px-3 py-2.5">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <span class="text-xs" style="color:${meta.color};">${meta.icon}</span>
                  <span class="text-xs font-medium" style="color:${meta.color};">${item.time}</span>
                  ${status==='active' ? '<span class="pulse-badge text-xs px-1.5 py-0.5 rounded-full font-semibold" style="background:#EAF3EE;color:#3D6B5C;">進行中</span>' : ''}
                  ${status==='done' ? '<span class="text-xs px-1.5 py-0.5 rounded-full" style="background:#EAE6E0;color:#7A756D;">✓ 完成</span>' : ''}
                </div>
                <p class="text-sm font-semibold leading-tight ${status==='done'?'line-through':''}" style="color:#1C1A17;">${item.title}</p>
                <p class="text-xs mt-0.5 leading-relaxed" style="color:#7A756D;">${item.summary}</p>
              </div>
              <span class="text-xs flex-shrink-0 transition-transform duration-200 ${expanded?'rotate-180':''}" style="color:#D8D3CB;">▼</span>
            </div>
          </div>

          <!-- Expanded details -->
          <div class="details-panel ${expanded?'open':''}">
            <div class="px-3 pb-3 border-t" style="border-color:#EAE6E0;">
              <p class="text-xs leading-relaxed mt-2 whitespace-pre-line" style="color:#7A756D;">${item.notes}</p>
              <!-- Status buttons -->
              <div class="flex gap-2 mt-3">
                <button onclick="event.stopPropagation(); setStatus('${item.id}','todo')"
                  class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-all active:scale-95"
                  style="background:${status==='todo'?'#EAE6E0':'#F4F1ED'}; color:${status==='todo'?'#1C1A17':'#7A756D'}; border:1px solid #EAE6E0;">
                  未開始
                </button>
                <button onclick="event.stopPropagation(); setStatus('${item.id}','active')"
                  class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-all active:scale-95"
                  style="background:${status==='active'?'#EAF3EE':'#F4F1ED'}; color:${status==='active'?'#3D6B5C':'#7A756D'}; border:1px solid ${status==='active'?'#A8D0C0':'#EAE6E0'};">
                  進行中
                </button>
                <button onclick="event.stopPropagation(); setStatus('${item.id}','done')"
                  class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-all active:scale-95"
                  style="background:${status==='done'?'#3D6B5C':'#F4F1ED'}; color:${status==='done'?'#fff':'#7A756D'}; border:1px solid ${status==='done'?'#3D6B5C':'#EAE6E0'};">
                  ✓ 完成
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

// ──────────────────────────────────────────
// TRANSIT TAB
// ──────────────────────────────────────────
function renderTransit(day) {
  const content = document.getElementById('transit-content');
  content.innerHTML = '';

  // Golden rules
  const gr = document.getElementById('golden-rules-list');
  gr.innerHTML = TRIP.golden.map((r,i) => `
    <div class="flex items-start gap-2">
      <span class="text-xs font-bold flex-shrink-0" style="color:#3D6B5C;">0${i+1}</span>
      <p class="text-xs leading-relaxed" style="color:#7A756D;">${r}</p>
    </div>
  `).join('');

  if (day.transit && day.transit.length > 0) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-2 mb-3';
    day.transit.forEach(t => {
      const card = document.createElement('div');
      card.className = 'rounded-xl p-3';
      card.style.cssText = 'background:#fff; border:1px solid #EAE6E0;';
      card.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-bold" style="color:#1C1A17;">${t.route}</span>
          <span class="text-xs px-2 py-0.5 rounded-full" style="background:#EAE6E0; color:#7A756D;">${t.note}</span>
        </div>
        <div class="flex items-center gap-2 text-xs" style="color:#7A756D;">
          <span class="font-medium" style="color:#3D6B5C;">${t.from}</span>
          <span>→</span>
          <span class="font-medium" style="color:#3D6B5C;">${t.to}</span>
        </div>
      `;
      wrap.appendChild(card);
    });
    content.appendChild(wrap);
  } else {
    const noTransit = document.createElement('div');
    noTransit.className = 'rounded-xl p-3 mb-3 text-xs';
    noTransit.style.cssText = 'background:#fff; border:1px solid #EAE6E0; color:#7A756D;';
    noTransit.textContent = '今日使用包車，無地鐵路線資訊。';
    content.appendChild(noTransit);
  }

  // Route
  const routeCard = document.createElement('div');
  routeCard.className = 'rounded-xl p-3 mb-3';
  routeCard.style.cssText = 'background:#EAE6E0;';
  routeCard.innerHTML = `<p class="text-xs leading-relaxed" style="color:#7A756D;">📍 ${day.route}</p>`;
  content.appendChild(routeCard);
}

// ──────────────────────────────────────────
// CHECKLIST TAB
// ──────────────────────────────────────────
function renderChecklist(day) {
  const content = document.getElementById('checklist-content');
  content.innerHTML = '';

  day.timeline.forEach(item => {
    const status = getStatus(item.id);
    const meta   = TYPE_META[item.type] || TYPE_META.spot;

    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 py-2.5 border-b tap-card cursor-pointer rounded-lg px-2 -mx-2 active:bg-muted transition-colors';
    row.style.borderColor = '#EAE6E0';
    row.onclick = () => cycleStatus(item.id);
    row.innerHTML = `
      <div class="w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all"
           style="background:${status==='done'?'#3D6B5C':status==='active'?'#EAF3EE':'#EAE6E0'}; border:1.5px solid ${status==='done'?'#3D6B5C':status==='active'?'#3D6B5C':'#D8D3CB'};">
        ${status==='done'?'<span style="color:#fff;font-size:10px;">✓</span>':status==='active'?'<span style="color:#3D6B5C;font-size:10px;">●</span>':''}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <span class="text-xs" style="color:${meta.color};">${meta.icon}</span>
          <span class="text-xs font-medium" style="color:${meta.color};">${item.time}</span>
        </div>
        <p class="text-sm font-medium truncate ${status==='done'?'line-through':''}" style="color:${status==='done'?'#7A756D':'#1C1A17'};">${item.title}</p>
      </div>
      <span class="text-xs flex-shrink-0 px-2 py-0.5 rounded-full"
            style="background:${status==='done'?'#EAE6E0':status==='active'?'#EAF3EE':'transparent'}; color:${status==='done'?'#7A756D':status==='active'?'#3D6B5C':'#D8D3CB'};">
        ${status==='done'?'完成':status==='active'?'進行中':'待辦'}
      </span>
    `;
    content.appendChild(row);
  });
}

// ──────────────────────────────────────────
// MEMO TAB
// ──────────────────────────────────────────
function renderMemo(day) {
  document.getElementById('memo-driver').textContent = TRIP.emergency.driver;
  document.getElementById('memo-taiwan').textContent = TRIP.emergency.taiwan;
  document.getElementById('memo-taiwan').href = 'tel:' + TRIP.emergency.taiwan.replace(/[^+\d]/g,'');

  document.getElementById('memo-day-title').textContent = '📌 ' + day.label + ' 導遊備忘';
  document.getElementById('memo-day-list').innerHTML = (day.memos || []).map(m => `
    <div class="flex items-start gap-2">
      <span class="text-xs flex-shrink-0 mt-0.5" style="color:#3D6B5C;">✓</span>
      <p class="text-xs leading-relaxed" style="color:#7A756D;">${m}</p>
    </div>
  `).join('');

  document.getElementById('golden-rules-memo').innerHTML = TRIP.golden.map((r,i) => `
    <div class="flex items-start gap-2">
      <span class="text-xs font-bold flex-shrink-0" style="color:#3D6B5C;">0${i+1}</span>
      <p class="text-xs leading-relaxed" style="color:#7A756D;">${r}</p>
    </div>
  `).join('');
}

// ──────────────────────────────────────────
// GUIDE MODE
// ──────────────────────────────────────────
function renderGuideMode(day) {
  document.getElementById('gm-day').textContent = day.label + '　' + day.date;
  document.getElementById('gm-title').textContent = day.title;
  document.getElementById('gm-people').textContent = day.people;
  document.getElementById('gm-transport').textContent = day.transport;
  document.getElementById('gm-meetup').textContent = day.meetup;
  document.getElementById('gm-motto').textContent = day.motto;

  // Show active and next todo items
  const items = day.timeline;
  const activeItems = items.filter(i => getStatus(i.id) === 'active');
  const nextItems   = items.filter(i => getStatus(i.id) === 'todo').slice(0, 3);
  const showItems   = activeItems.length > 0 ? activeItems : nextItems;

  document.getElementById('gm-active-items').innerHTML = showItems.length > 0
    ? showItems.map(item => `
        <div class="rounded-xl p-3" style="background:#2A2824; border:1px solid #3A3530;">
          <div class="flex items-center gap-2 mb-0.5">
            <span class="text-xs font-bold" style="color:#3D6B5C;">${item.time}</span>
            ${getStatus(item.id)==='active'?'<span class="pulse-badge text-xs px-1.5 rounded-full font-semibold" style="background:#1A3A2A;color:#5DB899;">進行中</span>':'<span class="text-xs" style="color:#7A756D;">下一站</span>'}
          </div>
          <p class="text-sm font-semibold" style="color:#F4F1ED;">${item.title}</p>
          <p class="text-xs leading-relaxed mt-0.5" style="color:#7A756D;">${item.summary}</p>
        </div>
      `).join('')
    : '<p class="text-sm" style="color:#7A756D;">今日行程已全部完成 🎉</p>';
}

function toggleGuideMode() {
  state.guideMode = !state.guideMode;
  saveState();

  const overlay  = document.getElementById('guide-overlay');
  const toggleBtn = document.getElementById('guide-toggle');
  const guideLabel = document.getElementById('guide-label');
  const guideIcon  = document.getElementById('guide-icon');

  if (state.guideMode) {
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
    toggleBtn.style.background = '#3D6B5C';
    toggleBtn.style.color = '#fff';
    toggleBtn.style.borderColor = '#3D6B5C';
    guideIcon.textContent = '✕';
    guideLabel.textContent = '關閉';
    renderGuideMode(TRIP.days[state.currentDay]);
    showToast('帶隊模式已開啟');
  } else {
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    toggleBtn.style.background = '#fff';
    toggleBtn.style.color = '#7A756D';
    toggleBtn.style.borderColor = '#D8D3CB';
    guideIcon.textContent = '⚡';
    guideLabel.textContent = '帶隊模式';
    showToast('已返回正常模式');
  }
}

// ──────────────────────────────────────────
// DAY NAVIGATION
// ──────────────────────────────────────────
function changeDay(delta) {
  const newDay = state.currentDay + delta;
  if (newDay < 0 || newDay >= TRIP.days.length) {
    showToast(delta < 0 ? '已是第一天' : '已是最後一天');
    return;
  }
  state.currentDay = newDay;
  saveState();
  renderAll();
  // Scroll to top
  document.getElementById('app-main').scrollTo({ top: 0, behavior: 'smooth' });
  showToast(TRIP.days[newDay].label + '　' + TRIP.days[newDay].date);
}

// ──────────────────────────────────────────
// STATUS MANAGEMENT
// ──────────────────────────────────────────
function getStatus(itemId) {
  return state.statuses[itemId] || 'todo';
}

function setStatus(itemId, status) {
  state.statuses[itemId] = status;
  saveState();
  renderAll();
  const labels = { todo: '標記為未開始', active: '標記為進行中', done: '標記完成 ✓' };
  showToast(labels[status] || '已更新');
}

function cycleStatus(itemId) {
  const current = getStatus(itemId);
  const next = current === 'todo' ? 'active' : current === 'active' ? 'done' : 'todo';
  setStatus(itemId, next);
}

function markAllDone() {
  const day = TRIP.days[state.currentDay];
  day.timeline.forEach(item => { state.statuses[item.id] = 'done'; });
  saveState();
  renderAll();
  showToast('今日行程全部完成 🎉');
}

function clearDayStatus() {
  const day = TRIP.days[state.currentDay];
  day.timeline.forEach(item => { delete state.statuses[item.id]; });
  saveState();
  renderAll();
  showToast('今日狀態已重置');
}

// ──────────────────────────────────────────
// EXPAND/COLLAPSE
// ──────────────────────────────────────────
function toggleExpand(itemId) {
  state.expandedItems[itemId] = !state.expandedItems[itemId];
  renderTimeline(TRIP.days[state.currentDay]);
  renderChecklist(TRIP.days[state.currentDay]);
}

// ──────────────────────────────────────────
// QUICK INFO MODAL
// ──────────────────────────────────────────
function showQuickInfo(type) {
  const day = TRIP.days[state.currentDay];
  const modal = document.getElementById('quick-modal');
  const body  = document.getElementById('quick-modal-body');

  let html = '';

  if (type === 'meetup') {
    html = `
      <p class="text-xs font-bold uppercase tracking-widest mb-3" style="color:#3D6B5C;">📍 走散集合點</p>
      <p class="text-xl font-bold mb-3" style="color:#1C1A17;">${day.meetup}</p>
      <p class="text-xs leading-relaxed" style="color:#7A756D;">走散時不找人，直接前往此集合點等待。</p>
    `;
  } else if (type === 'transit') {
    html = `<p class="text-xs font-bold uppercase tracking-widest mb-3" style="color:#3D6B5C;">🚇 今日交通</p>`;
    html += `<p class="text-sm font-semibold mb-3" style="color:#1C1A17;">${day.transport}</p>`;
    if (day.transit && day.transit.length > 0) {
      html += day.transit.map(t => `
        <div class="rounded-xl p-3 mb-2" style="background:#F4F1ED; border:1px solid #EAE6E0;">
          <p class="text-xs font-bold mb-1" style="color:#1C1A17;">${t.route}</p>
          <p class="text-xs" style="color:#3D6B5C;">${t.from} → ${t.to}</p>
          <p class="text-xs mt-1" style="color:#8B5E3C;">${t.note}</p>
        </div>
      `).join('');
    } else {
      html += '<p class="text-xs" style="color:#7A756D;">今日全程包車，無需搭乘地鐵。</p>';
    }
    html += `<div class="mt-3 p-3 rounded-xl" style="background:#EAE6E0;">
      <p class="text-xs leading-relaxed" style="color:#7A756D;">路線：${day.route}</p>
    </div>`;
  } else if (type === 'emergency') {
    html = `
      <p class="text-xs font-bold uppercase tracking-widest mb-4" style="color:#8B3A3A;">🆘 緊急聯絡</p>
      <div class="space-y-3">
        <a href="tel:110" class="flex items-center justify-between p-3 rounded-xl" style="background:#FAEAEA; border:1px solid #F0D0D0;">
          <span class="text-sm font-medium" style="color:#1C1A17;">日本警察</span>
          <span class="text-2xl font-bold" style="color:#8B3A3A;">110</span>
        </a>
        <a href="tel:119" class="flex items-center justify-between p-3 rounded-xl" style="background:#FAEAEA; border:1px solid #F0D0D0;">
          <span class="text-sm font-medium" style="color:#1C1A17;">日本救護</span>
          <span class="text-2xl font-bold" style="color:#8B3A3A;">119</span>
        </a>
        <div class="flex items-center justify-between p-3 rounded-xl" style="background:#F4F1ED; border:1px solid #EAE6E0;">
          <span class="text-sm font-medium" style="color:#1C1A17;">包車司機</span>
          <span class="text-sm font-bold" style="color:#3D6B5C;">${TRIP.emergency.driver}</span>
        </div>
        <a href="tel:${TRIP.emergency.taiwan.replace(/[^+\d]/g,'')}" class="flex items-center justify-between p-3 rounded-xl" style="background:#F4F1ED; border:1px solid #EAE6E0;">
          <span class="text-sm font-medium" style="color:#1C1A17;">台灣駐大阪辦事處</span>
          <span class="text-xs font-bold" style="color:#3D6B5C;">${TRIP.emergency.taiwan}</span>
        </a>
      </div>
    `;
  } else if (type === 'memo') {
    html = `<p class="text-xs font-bold uppercase tracking-widest mb-3" style="color:#1C1A17;">📌 ${day.label} 導遊備忘</p>`;
    html += (day.memos || []).map((m,i) => `
      <div class="flex items-start gap-2 mb-2">
        <span class="text-xs flex-shrink-0 mt-0.5 font-bold" style="color:#3D6B5C;">✓</span>
        <p class="text-sm leading-relaxed" style="color:#1C1A17;">${m}</p>
      </div>
    `).join('');
  }

  body.innerHTML = html;
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeQuickModal(event) {
  const modal = document.getElementById('quick-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

// ──────────────────────────────────────────
// TAB SWITCHING
// ──────────────────────────────────────────
function switchTab(tabName) {
  state.currentTab = tabName;
  saveState();

  // Hide all tab views
  document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));

  // Show selected
  const targetEl = document.getElementById('tab-' + tabName);
  if (targetEl) {
    targetEl.classList.remove('hidden');
    targetEl.classList.add('fade-in');
  }

  // Update tab bar
  document.querySelectorAll('[id^="tabn-"]').forEach(btn => {
    btn.querySelector('.tab-dot').style.opacity = '0';
    btn.querySelectorAll('span').forEach(s => s.style.color = '#7A756D');
  });
  const activeBtn = document.getElementById('tabn-' + tabName);
  if (activeBtn) {
    activeBtn.querySelector('.tab-dot').style.opacity = '1';
    activeBtn.querySelectorAll('span').forEach((s,i) => {
      if (i === 1) s.style.color = '#1C1A17'; // label
    });
  }
}

// ──────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ──────────────────────────────────────────
// BOOT
// ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
